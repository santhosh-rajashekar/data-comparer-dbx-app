name: Deploy RDM App

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Deployment target'
        required: true
        type: choice
        options:
          - dev
          - test

env:
  DATABRICKS_BUNDLE_NAME: data-comparer-dbx-app

jobs:
  # ── test ── auto on push to main ──────────────────────────────────────
  deploy-test:
    name: Deploy to TEST
    runs-on: ubuntu-latest
    environment: test
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'test')
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: Deploy bundle
        run: databricks bundle deploy --target test
        env:
          DATABRICKS_HOST:              ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN:             ${{ secrets.DATABRICKS_TOKEN }}
          BUNDLE_VAR_flask_secret:      ${{ secrets.FLASK_SECRET }}
          BUNDLE_VAR_hub_catalog:       ${{ vars.HUB_CATALOG }}
          BUNDLE_VAR_serving_endpoint:  ${{ vars.SERVING_ENDPOINT }}
      - name: Start app
        run: databricks bundle run rdm_3way_diff --target test
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

  # ── dev ── manual dispatch only ───────────────────────────────────────
  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    environment: dev
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'dev'
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: Deploy bundle
        run: databricks bundle deploy --target dev
        env:
          DATABRICKS_HOST:              ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN:             ${{ secrets.DATABRICKS_TOKEN }}
          BUNDLE_VAR_flask_secret:      ${{ secrets.FLASK_SECRET }}
          BUNDLE_VAR_hub_catalog:       ${{ vars.HUB_CATALOG }}
          BUNDLE_VAR_serving_endpoint:  ${{ vars.SERVING_ENDPOINT }}
      - name: Start app
        run: databricks bundle run rdm_3way_diff --target dev
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
