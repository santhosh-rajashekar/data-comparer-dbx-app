name: Deploy RDM App

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Deployment target'
        required: true
        type: choice
        options:
          - dev
          - test

env:
  DATABRICKS_BUNDLE_NAME: data-comparer-dbx-app

jobs:
  # Validate bundle structure against dev (existing workspace, repo-level creds)
  validate:
    name: Validate Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: Validate bundle
        run: databricks bundle validate --strict
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

  # ── test: dbx-dps-raise-dev — auto-deploys on every push to main ──────
  # Environment-level secrets for 'test' hold the raise workspace creds.
  deploy-test:
    name: Deploy to TEST (dbx-dps-raise-dev)
    needs: validate
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'test')
    runs-on: ubuntu-latest
    environment: test
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: Deploy to test
        run: databricks bundle deploy --target test
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

  # ── dev: existing workspace — manual dispatch only ────────────────────
  deploy-dev:
    name: Deploy to DEV
    needs: validate
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'dev'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: Deploy to dev
        run: databricks bundle deploy --target dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
