name: PR Validation

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate & Dry Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - name: Validate bundle (all targets)
        run: |
          echo "=== Validating dev ==="
          databricks bundle validate --target dev
          echo "=== Validating test ==="
          databricks bundle validate --target test
          echo "=== Validating prp ==="
          databricks bundle validate --target prp
          echo "=== Validating prd ==="
          databricks bundle validate --target prd
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.SP_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.SP_CLIENT_SECRET }}

      - name: Summary
        run: databricks bundle summary --target dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.SP_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.SP_CLIENT_SECRET }}
