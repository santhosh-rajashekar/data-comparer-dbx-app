# ============================================================
# RDM 3-Way Diff — Databricks App Bundle
# Reference & Master Data Quality Assurance Tool
# ============================================================

bundle:
  name: data-comparer-dbx-app

variables:
  serving_endpoint:
    description: "Foundation Model API endpoint for RDM Agent"
    default: "databricks-claude-sonnet-4-5"
  flask_secret:
    description: "Flask session secret key"
    default: "rdm-app-secret-change-in-prod"
  rdm_access_group:
    description: "AAD group (synced via SCIM) whose members can access the app"
    default: "rdm-tool-users"
  deploy_sp:
    description: "Service principal used for bundle deployment"
    default: "sp-data-comparer-deploy"

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405616457611961.1.azuredatabricks.net
    variables:
      flask_secret: "rdm-app-secret-dev"
      # In dev, the same group applies; override here if needed
      # rdm_access_group: "rdm-tool-users-dev"

  test:
    workspace:
      host: https://adb-7405616457611961.1.azuredatabricks.net
    variables:
      flask_secret: "rdm-app-secret-test"

  prp:
    workspace:
      host: https://adb-7405616457611961.1.azuredatabricks.net
    variables:
      flask_secret: "rdm-app-secret-prp"

  prd:
    mode: production
    workspace:
      host: https://adb-7405616457611961.1.azuredatabricks.net
    variables:
      serving_endpoint: "databricks-claude-sonnet-4-5"
      flask_secret: "rdm-app-secret-prd"
    permissions:
      - service_principal_name: ${var.deploy_sp}
        level: CAN_MANAGE
