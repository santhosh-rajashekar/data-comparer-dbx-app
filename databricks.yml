# ============================================================
# RDM 3-Way Diff — Databricks App Bundle
# Reference & Master Data Quality Assurance Tool
# ============================================================
# All workspace-specific values are injected at deploy time via:
#   Secrets : DATABRICKS_HOST, DATABRICKS_TOKEN, FLASK_SECRET
#   Variables: HUB_CATALOG, RDM_ACCESS_GROUP, SERVING_ENDPOINT
# These are stored in GitHub environment-level secrets/variables.
# Nothing workspace-specific is hardcoded in this file.
# ============================================================

bundle:
  name: data-comparer-dbx-app

variables:
  deploy_sp:
    description: "Service principal used for bundle deployment"
    default: "sp-data-comparer-deploy"

include:
  - resources/*.yml

targets:

  # ── dev ────────────────────────────────────────────────────────────────
  # Workspace resolved from DATABRICKS_HOST env var (GitHub env secret).
  # Variable overrides injected via BUNDLE_VAR_* env vars (GitHub vars).
  dev:
    mode: development
    default: true

  # ── test ───────────────────────────────────────────────────────────────
  # Same pattern — host and vars come entirely from GitHub environment.
  test:
    mode: production
