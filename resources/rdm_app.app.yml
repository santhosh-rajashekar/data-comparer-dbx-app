resources:
  apps:
    ref_reconcile_app:
      name: ref-reconcile-app
      description: |
        RDM 3-Way Diff — Reference & Master Data Quality Assurance.
        Performs 3-way reconciliation across COA, FAQ (SAP), and DataPool.
        Uses Databricks Foundation Model API for AI-powered analysis.
      source_code_path: ../src/rdm_app

      permissions:
        # Add group_name + CAN_USE here when access groups are configured.
        # - group_name: rdm-tool-users
        #   level: CAN_USE
        - service_principal_name: ${var.deploy_sp}
          level: CAN_MANAGE
