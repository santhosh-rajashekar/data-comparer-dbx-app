# Included via the global resources/*.yml pattern but content is
# commented out by default to prevent CATALOG_ALREADY_EXISTS in
# dev / test / prp / prd where these objects already exist.
#
# PREFERRED: Run the idempotent UC Bootstrap notebook instead:
#   data-mesh-demo/src/notebooks/UC_Bootstrap_New_Workspace
#   (uses CREATE ... IF NOT EXISTS — safe to run multiple times)
